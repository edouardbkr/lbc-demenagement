<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Aperçu camion LBC</title>
<style>
  :root{ --ink:#15293A; --accent:#D75B3D; --paper:#FAF6EC; }
  body{ margin:0; background:#EFE8D8; font-family:system-ui,sans-serif; color:var(--ink); }
  .stage{ display:flex; flex-direction:column; align-items:center; gap:8px; padding:60px 20px; }
  h2{ font-weight:600; font-size:15px; opacity:.6; margin:0 0 24px; letter-spacing:.5px; }
  .road{ position:relative; width:520px; max-width:90vw; height:230px; }
  .road-line{ position:absolute; left:0; right:0; bottom:34px; height:3px;
    background:repeating-linear-gradient(90deg, var(--ink) 0 22px, transparent 22px 44px); opacity:.55; }
  .road-truck{ position:absolute; bottom:18px; left:50%; transform:translateX(-50%); width:480px; }
  .road-truck svg{ display:block; width:480px; height:auto; }
  .road-logo{ position:absolute; top:40px; left:79px; width:144px; height:auto; z-index:2; }
  .road-driver{ position:absolute; top:69px; left:294px; width:75px; height:53px;
    border-radius:6px; z-index:3; overflow:hidden;
    background:url('assets/lbc-mascot-sm.png') no-repeat; background-size:250%; background-position:44% 20%; }
  .cap{ font-size:13px; opacity:.55; margin-top:18px; }
</style>
</head>
<body>
  <div class="stage">
    <h2>NOUVEAU CAMION — capot allongé + roues pleines</h2>
    <div class="road">
      <div class="road-line"></div>
      <div class="road-truck">
        <img class="road-logo" src="assets/lbc-wordmark-sm.png" alt="LBC"/>
        <div class="road-driver"></div>
        <svg viewBox="0 0 380 150" width="480" fill="none" stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
          <g stroke="var(--accent)" stroke-width="3.5">
            <path d="M52 56 H12"/><path d="M46 74 H6"/><path d="M52 92 H22"/>
          </g>
          <rect x="14" y="20" width="210" height="86" rx="6" fill="var(--paper)"/>
          <path d="M224 106 V54 Q224 48 230 48 H300 L336 80 H356 Q364 80 364 90 V106 Z" fill="var(--paper)"/>
          <rect x="232" y="54" width="60" height="42" rx="6" fill="#cdd9df"/>
          <path d="M306 56 L332 80 H313 Q307 80 307 73 Z" fill="#cdd9df" stroke="none"/>
          <circle cx="84" cy="122" r="18" fill="var(--ink)"/>
          <circle cx="84" cy="122" r="6" fill="var(--accent)" stroke="none"/>
          <circle cx="312" cy="122" r="18" fill="var(--ink)"/>
          <circle cx="312" cy="122" r="6" fill="var(--accent)" stroke="none"/>
          <circle cx="362" cy="94" r="3" fill="var(--accent)" stroke="none"/>
        </svg>
      </div>
    </div>
    <div class="cap">Si ça te va, je le mets en ligne. Sinon dis-moi quoi ajuster.</div>
  </div>
</body>
</html>
